<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Task Prioritizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 620px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
      color: #333;
    }

    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin: 0 0 24px; }

    /* --- metrics --- */
    .metrics {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric {
      flex: 1;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .metric-label { font-size: 12px; color: #888; margin: 0 0 4px; }
    .metric-value { font-size: 20px; font-weight: bold; margin: 0; }

    /* --- add form --- */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .add-row button {
      padding: 10px 20px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-row button:hover { background: #555; }

    /* --- filter tabs --- */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .filter-tab {
      padding: 5px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #555;
    }

    .filter-tab.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    /* --- task items --- */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .task-item.done { opacity: 0.5; }
    .task-item.done .task-text { text-decoration: line-through; }

    .task-item input[type="checkbox"] {
      margin-top: 3px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 14px;
      margin: 0 0 4px;
      word-break: break-word;
    }

    .task-tip {
      font-size: 12px;
      color: #888;
      margin: 0;
      font-style: italic;
    }

    .task-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-high   { background: #FAECE7; color: #712B13; }
    .badge-medium { background: #FAEEDA; color: #633806; }
    .badge-low    { background: #EAF3DE; color: #27500A; }
    .badge-pending { background: #eee; color: #888; }

    .score {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      min-width: 24px;
      text-align: center;
    }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .del-btn:hover { color: #e00; }

    .empty-msg {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 30px 0;
    }

    /* --- schedule box --- */
    .schedule-box {
      margin-top: 24px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 40px;
    }

    .schedule-box h2 { font-size: 15px; margin: 0 0 10px; }

    .sched-btn {
      padding: 8px 18px;
      background: #5a3fd6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .sched-btn:hover { background: #4730b0; }

    #schedule-output {
      font-size: 13px;
      color: #555;
      line-height: 1.7;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>AI Task Prioritizer</h1>
  <p class="subtitle">Add your tasks — AI will score, rank, and schedule them for you.</p>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric">
      <p class="metric-label">Total tasks</p>
      <p class="metric-value" id="total-count">0</p>
    </div>
    <div class="metric">
      <p class="metric-label">Completed</p>
      <p class="metric-value" id="done-count">0</p>
    </div>
    <div class="metric">
      <p class="metric-label">High urgency</p>
      <p class="metric-value" id="high-count">0</p>
    </div>
  </div>

  <!-- Add task form -->
  <div class="add-row">
    <input type="text" id="task-input" placeholder="Add a task e.g. Finish project report" />
    <button onclick="handleAdd()">Add task</button>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all')">All</button>
    <button class="filter-tab" onclick="setFilter('high')">High urgency</button>
    <button class="filter-tab" onclick="setFilter('pending')">Pending</button>
    <button class="filter-tab" onclick="setFilter('done')">Done</button>
  </div>

  <!-- Task list -->
  <div id="task-list"></div>

  <!-- Schedule box -->
  <div class="schedule-box">
    <h2>Generate daily schedule</h2>
    <button class="sched-btn" onclick="generateSchedule()">Build my schedule</button>
    <div id="schedule-output">Add and prioritize tasks, then click to generate a time-blocked schedule.</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
